<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor Neural Bidirecional</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="app-container">

        <h1>Tradutor Neural</h1>

        <!-- Display dos idiomas detectados automaticamente -->
        <div id="lang-display">
            <span class="lang" id="lang-a">?</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 style="color:#94a3b8; flex-shrink:0;">
                <path d="M17 2.1l4 4-4 4"/><path d="M21 6H3"/>
                <path d="M7 21.9l-4-4 4-4"/><path d="M3 18h18"/>
            </svg>
            <span class="lang" id="lang-b">?</span>
        </div>

        <!-- Hub dos botões de fala -->
        <div class="buttons-hub">

            <div class="mic-zone" id="zone-a">
                <div class="pulse-wave pulse-a" id="pulse-a"></div>
                <button class="btn-speak btn-a" id="btn-a" aria-label="Falar como Pessoa A">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                </button>
            </div>

            <div class="mic-zone" id="zone-b">
                <div class="pulse-wave pulse-b" id="pulse-b"></div>
                <button class="btn-speak btn-b" id="btn-b" aria-label="Falar como Pessoa B">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                </button>
            </div>

        </div>

        <!-- Resultado da tradução -->
        <div class="transcript-card">
            <div class="box-title">Resultado da Tradução</div>
            <div class="original-text"   id="txt-original">—</div>
            <div class="translated-text" id="txt-translated">—</div>
        </div>

        <!-- Barra de status com LEDs -->
        <div class="status-bar">
            <div id="led-rec"   class="led led-rec"></div>
            <div id="led-proc"  class="led led-proc"></div>
            <div id="led-speak" class="led led-speak"></div>
            <span id="status">Aguardando conexão...</span>
        </div>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
