# alembic.ini — NMT Fase 2
# ATENÇÃO: DATABASE_URL é lida da variável de ambiente em env.py
# Não coloque a URL aqui para não expor credenciais.

[alembic]
script_location = alembic
prepend_sys_path = .

# Deixe vazio — env.py lê de os.environ
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
